<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAI — Cloud & IoT Professional Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
  /* Variabel warna tetap sama */
  :root {
    --bg-main: #09090b; --bg-sidebar: #121214; --bg-card: #18181b; --bg-input: #27272a;
    --accent: #6366f1; --text-primary: #fafafa; --text-secondary: #a1a1aa; --border: #27272a;
    --user-bubble: #3f3f46; --sidebar-w: 260px; --transition: all 0.2s ease;
  }
  [data-theme="light"] {
    --bg-main: #ffffff; --bg-sidebar: #f4f4f5; --bg-card: #f4f4f5; --bg-input: #ffffff;
    --text-primary: #18181b; --text-secondary: #71717a; --border: #e4e4e7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-primary); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px; }
  .new-chat { border: 1px solid var(--border); background: var(--accent); color: white; padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; margin-bottom: 20px; transition: var(--transition); }
  .new-chat:hover { background: var(--accent-hover); }
  .history-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; padding-left: 8px; }
  .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .history-item { padding: 10px; border-radius: 8px; font-size: 13.5px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-secondary); transition: var(--transition); display: flex; align-items: center; gap: 8px; }
  .history-item:hover { background: var(--bg-card); color: var(--text-primary); }
  .history-item.active { background: var(--bg-input); color: var(--text-primary); }

  /* MAIN CONTENT */
  .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
  header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .chat-container { flex: 1; overflow-y: auto; padding: 40px 20px; display: flex; flex-direction: column; gap: 30px; }
  .message-wrapper { max-width: 800px; margin: 0 auto; width: 100%; display: flex; gap: 16px; }
  .avatar { width: 32px; height: 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }
  .avatar.ai { background: var(--accent); color: white; }
  .avatar.user { background: #ec4899; color: white; }
  .bubble { line-height: 1.6; font-size: 15px; white-space: pre-wrap; }

  /* INPUT AREA */
  .input-area { padding: 20px; background: linear-gradient(transparent, var(--bg-main) 50%); }
  .input-box { max-width: 800px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 16px; display: flex; align-items: flex-end; gap: 12px; }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-size: 15px; padding: 8px 0; resize: none; max-height: 200px; }
  .send-btn { background: var(--accent); border: none; color: white; padding: 8px; border-radius: 6px; cursor: pointer; }

  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  .typing-dot { width: 4px; height: 4px; background: var(--text-secondary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
</style>
</head>
<body>

<aside class="sidebar">
  <button class="new-chat" onclick="createNewChat()">
    <span>+</span> New Chat
  </button>
  <div class="history-label">Past Conversations</div>
  <div class="history-list" id="historyList"></div>
</aside>

<main class="main-content">
  <header>
    <div style="font-family:'Syne'; font-weight:700">NexusAI</div>
    <div id="sessionTitle" style="font-size: 12px; color: var(--text-secondary);">Current Session</div>
    <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer;">🌓</button>
  </header>

  <div class="chat-container" id="chatWindow">
    </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="chatInput" rows="1" placeholder="Type your message..."></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</main>

<script>
  const API_URL = "http://localhost:8080/chat";
  const chatWindow = document.getElementById('chatWindow');
  const chatInput = document.getElementById('chatInput');
  const historyList = document.getElementById('historyList');
  
  let currentChat = []; // Nyimpan chat aktif saat ini
  let allSessions = JSON.parse(localStorage.getItem('nexus_sessions') || '[]');

  // 1. Fungsi Buat Chat Baru (Simpan yang lama ke Riwayat)
  function createNewChat() {
    if (currentChat.length > 0) {
      const firstUserMsg = currentChat.find(m => m.role === 'user')?.text || "New Conversation";
      const sessionId = Date.now();
      
      // Simpan ke allSessions
      allSessions.push({
        id: sessionId,
        title: firstUserMsg,
        messages: [...currentChat]
      });
      
      localStorage.setItem('nexus_sessions', JSON.stringify(allSessions));
    }
    
    // Reset Layar
    currentChat = [];
    renderHistory();
    renderMessages();
    addMessage("Halo Raihan! Sesi baru dimulai. Apa yang bisa saya bantu terkait Cloud atau IoT?", 'ai');
  }

  // 2. Render Daftar Riwayat di Sidebar
  function renderHistory() {
    historyList.innerHTML = allSessions.slice().reverse().map(session => `
      <div class="history-item" onclick="loadSession(${session.id})">
        <svg style="width:14px; height:14px; opacity:0.6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        ${session.title}
      </div>
    `).join('');
  }

  // 3. Load Chat Lama dari Riwayat
  function loadSession(id) {
    const session = allSessions.find(s => s.id === id);
    if (session) {
      currentChat = [...session.messages];
      renderMessages();
    }
  }

  function renderMessages() {
    chatWindow.innerHTML = '';
    currentChat.forEach(msg => displayMessage(msg.text, msg.role));
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    chatInput.value = '';
    
    const typingId = 'typing-' + Date.now();
    showTyping(typingId);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      document.getElementById(typingId).remove();
      addMessage(data.reply || "Gagal mendapatkan respon.", 'ai');
    } catch (err) {
      if(document.getElementById(typingId)) document.getElementById(typingId).remove();
      addMessage("Error koneksi backend.", 'ai');
    }
  }

  function addMessage(text, role) {
    currentChat.push({ text, role });
    displayMessage(text, role);
  }

  function displayMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'message-wrapper';
    div.innerHTML = `
      <div class="avatar ${role}">${role === 'ai' ? 'N' : 'R'}</div>
      <div class="bubble">${text}</div>
    `;
    chatWindow.appendChild(div);
    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
  }

  function showTyping(id) {
    const div = document.createElement('div');
    div.className = 'message-wrapper';
    div.id = id;
    div.innerHTML = `
      <div class="avatar ai">N</div>
      <div class="bubble" style="display:flex; gap:4px; align-items:center; height:24px">
        <div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div>
      </div>
    `;
    chatWindow.appendChild(div);
    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
  }

  function toggleTheme() {
    const theme = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
  }

  // Jalankan render awal
  renderHistory();
  addMessage("Halo Raihan! Bagaimana progress infrastruktur Cloud atau IoT kamu hari ini?", 'ai');
</script>
</body>
</html>
