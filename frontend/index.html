<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAI — Cloud & IoT Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0d0f14;
    --bg-secondary: #13161e;
    --bg-tertiary: #1a1e2a;
    --bg-card: #1e2230;
    --bg-input: #161921;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text-primary: #e8eaf0;
    --text-secondary: #8b90a0;
    --text-muted: #555a6e;
    --accent: #6c7fff;
    --accent-hover: #8a93ff;
    --user-bubble: #6c7fff;
    --user-text: #ffffff;
    --ai-bubble: #1e2230;
    --ai-text: #e8eaf0;
    --sidebar-w: 280px;
    --header-h: 64px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  [data-theme="light"] {
    --bg-primary: #f8f9fc;
    --bg-secondary: #ffffff;
    --bg-tertiary: #eff2f7;
    --bg-card: #ffffff;
    --bg-input: #f1f3f9;
    --border: rgba(0,0,0,0.06);
    --text-primary: #1a1e2e;
    --text-secondary: #5a6180;
    --text-muted: #94a3b8;
    --accent: #4c5ff7;
    --ai-bubble: #ffffff;
    --ai-text: #1a1e2e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    transition: background var(--transition), color var(--transition);
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 999;
  }
  .overlay.show { display: block; }

  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform var(--transition);
    z-index: 1000;
  }

  @media (max-width: 768px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
  }

  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2.5; }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; }

  .new-chat-btn {
    margin: 16px; padding: 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 12px;
    font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .chat-list { flex: 1; overflow-y: auto; padding: 0 12px; }
  .chat-item {
    padding: 12px; border-radius: 10px; cursor: pointer;
    margin-bottom: 4px; color: var(--text-secondary);
    font-size: 14px; transition: 0.2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-item:hover, .chat-item.active { background: var(--bg-tertiary); color: var(--text-primary); }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

  .topbar {
    height: var(--header-h);
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px; gap: 12px;
  }

  .menu-toggle {
    display: none;
    background: var(--bg-secondary); border: 1px solid var(--border);
    color: var(--text-primary); padding: 8px; border-radius: 8px; cursor: pointer;
  }
  @media (max-width: 768px) { .menu-toggle { display: block; } }

  .topbar-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; flex: 1; }

  .messages-wrap { flex: 1; overflow-y: auto; padding: 20px 0; }
  .messages-inner { max-width: 800px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 24px; }

  .msg { display: flex; gap: 12px; max-width: 100%; animation: fadeUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar { 
    width: 32px; height: 32px; border-radius: 8px; 
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold;
  }
  .msg-avatar.ai { background: var(--accent); color: white; }
  .msg-avatar.user { background: #10b981; color: white; }

  .bubble { 
    padding: 12px 16px; border-radius: 18px; 
    font-size: 15px; line-height: 1.5; 
    max-width: calc(100% - 44px);
    word-wrap: break-word;
    white-space: pre-wrap; /* Menjaga line break dari plain text */
  }
  .bubble.ai { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .bubble.user { background: var(--user-bubble); color: var(--user-text); border-top-right-radius: 4px; }

  .input-area { padding: 16px; background: linear-gradient(transparent, var(--bg-primary) 30%); }
  .input-container {
    max-width: 800px; margin: 0 auto;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 8px 12px;
    display: flex; align-items: flex-end; gap: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  #chatInput {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text-primary); font-family: inherit; font-size: 15px;
    padding: 10px 4px; max-height: 200px; resize: none;
  }

  .send-btn {
    background: var(--accent); color: white; border: none;
    width: 36px; height: 36px; border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s; flex-shrink: 0;
  }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: blink 1.4s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 3l9 4.5-9 4.5-9-4.5L12 3z"/></svg></div>
      <span class="logo-text">NexusAI</span>
    </div>
  </div>
  <button class="new-chat-btn" onclick="location.reload()">+ Baru</button>
  <div class="chat-list">
    <div class="chat-item active">Cloud & IoT Session</div>
    <div class="chat-item">Riwayat akan muncul di sini...</div>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <span class="topbar-title">Cloud & IoT Expert Assistant</span>
    <button onclick="toggleTheme()" style="background:none; border:none; font-size: 1.2rem; cursor:pointer;">🌓</button>
  </header>

  <div class="messages-wrap" id="scrollArea">
    <div class="messages-inner" id="chatWindow">
      <div class="msg">
        <div class="msg-avatar ai">N</div>
        <div class="bubble ai">Halo Raihan! Tanyakan apapun seputar Cloud Computing (AWS/DevOps) atau IoT (ESP32/MQTT). Saya akan menjawab tanpa format markdown.</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-container">
      <textarea id="chatInput" placeholder="Tanya seputar Cloud atau IoT..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</main>

<script>
  const API_URL = "http://localhost:8080/chat";
  const chatInput = document.getElementById('chatInput');
  const chatWindow = document.getElementById('chatWindow');
  const scrollArea = document.getElementById('scrollArea');
  let isProcessing = false;

  // Pembersih Markdown jika Backend tidak sengaja mengirimkannya
  function cleanMarkdown(text) {
    return text
      .replace(/[#*`_~]/g, '') // Hapus simbol bold, italic, code, dsb.
      .trim();
  }

  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });

  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey && window.innerWidth > 768) {
      e.preventDefault();
      sendMessage();
    }
  });

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }

  function toggleTheme() {
    const theme = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text || isProcessing) return;

    isProcessing = true;
    addMessage(text, 'user');
    chatInput.value = '';
    chatInput.style.height = 'auto';
    
    const typingId = 'type-' + Date.now();
    addTyping(typingId);
    scrollToBottom();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      
      const data = await res.json();
      document.getElementById(typingId).remove();
      
      // Bersihkan respon sebelum ditampilkan
      const finalReply = cleanMarkdown(data.reply || "Maaf, terjadi kesalahan.");
      addMessage(finalReply, 'ai');
    } catch (err) {
      if(document.getElementById(typingId)) document.getElementById(typingId).remove();
      addMessage("Koneksi gagal. Pastikan Backend sudah berjalan di raihan-pc.", 'ai');
    } finally {
      isProcessing = false;
      scrollToBottom();
    }
  }

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `msg ${sender}`;
    div.innerHTML = `
      <div class="msg-avatar ${sender}">${sender === 'ai' ? 'N' : 'R'}</div>
      <div class="bubble ${sender}">${text}</div>
    `;
    chatWindow.appendChild(div);
  }

  function addTyping(id) {
    const div = document.createElement('div');
    div.className = 'msg';
    div.id = id;
    div.innerHTML = `
      <div class="msg-avatar ai">N</div>
      <div class="bubble ai"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    `;
    chatWindow.appendChild(div);
  }

  function scrollToBottom() {
    scrollArea.scrollTo({ top: scrollArea.scrollHeight, behavior: 'smooth' });
  }
</script>
</body>
</html>
