<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAI — Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0d0f14;
    --bg-secondary: #13161e;
    --bg-tertiary: #1a1e2a;
    --bg-card: #1e2230;
    --bg-input: #161921;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text-primary: #e8eaf0;
    --text-secondary: #8b90a0;
    --text-muted: #555a6e;
    --accent: #6c7fff;
    --accent-hover: #8a93ff;
    --accent-glow: rgba(108, 127, 255, 0.18);
    --accent-soft: rgba(108, 127, 255, 0.1);
    --user-bubble: #6c7fff;
    --user-text: #ffffff;
    --ai-bubble: #1e2230;
    --ai-text: #e8eaf0;
    --sidebar-w: 260px;
    --header-h: 60px;
    --send-btn: #6c7fff;
    --online: #34d399;
    --scrollbar: rgba(255,255,255,0.06);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  [data-theme="light"] {
    --bg-primary: #f0f2f8;
    --bg-secondary: #ffffff;
    --bg-tertiary: #e8ebf4;
    --bg-card: #ffffff;
    --bg-input: #f5f7fc;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.15);
    --text-primary: #1a1e2e;
    --text-secondary: #5a6180;
    --text-muted: #a0a8c0;
    --accent: #4c5ff7;
    --accent-hover: #3a4ef0;
    --accent-glow: rgba(76,95,247,0.14);
    --accent-soft: rgba(76,95,247,0.08);
    --user-bubble: #4c5ff7;
    --user-text: #ffffff;
    --ai-bubble: #f0f2f8;
    --ai-text: #1a1e2e;
    --send-btn: #4c5ff7;
    --online: #059669;
    --scrollbar: rgba(0,0,0,0.08);
    --shadow: 0 4px 24px rgba(0,0,0,0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
    transition: background var(--transition), color var(--transition);
  }

  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform var(--transition), background var(--transition);
    z-index: 100;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 17px;
    letter-spacing: -0.3px; color: var(--text-primary);
  }
  .logo-text span { color: var(--accent); }

  .new-chat-btn {
    margin: 14px 16px; padding: 10px 16px;
    background: var(--accent-soft);
    border: 1px dashed rgba(108,127,255,0.35);
    border-radius: 10px; color: var(--accent);
    font-size: 13.5px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: all var(--transition);
  }
  .new-chat-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .chat-list { overflow-y: auto; flex: 1; padding: 0 8px 8px; }
  .chat-item {
    padding: 10px 12px; border-radius: 9px; cursor: pointer;
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 2px;
  }
  .chat-item.active { background: var(--accent-soft); }

  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: var(--header-h); background: var(--bg-secondary);
    border-bottom: 1px solid var(--border); display: flex; align-items: center;
    padding: 0 20px; gap: 12px;
  }
  .topbar-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; flex: 1; }

  .messages-wrap { flex: 1; overflow-y: auto; padding: 28px 0; scroll-behavior: smooth; }
  .messages-inner { max-width: 740px; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; gap: 20px; }

  .msg { display: flex; gap: 14px; animation: fadeUp 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
  .msg-avatar.ai { background: var(--accent); color: #fff; }
  .msg-avatar.user { background: #34d399; color: #fff; }

  .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.6; }
  .bubble.ai { background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 4px 16px 16px 16px; }
  .bubble.user { background: var(--user-bubble); color: var(--user-text); border-radius: 16px 4px 16px 16px; }

  .input-area { padding: 16px 20px 20px; background: var(--bg-secondary); border-top: 1px solid var(--border); }
  .input-box { max-width: 740px; margin: 0 auto; background: var(--bg-input); border: 1px solid var(--border); border-radius: 16px; display: flex; padding: 10px; }
  
  #chatInput { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); resize: none; padding: 6px; }
  .send-btn { width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 10px; cursor: pointer; color: #fff; display: flex; align-items: center; justify-content: center; }

  .typing-indicator { display: flex; gap: 4px; padding: 10px; }
  .typing-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-mark"><svg viewBox="0 0 24 24"><path d="M12 3l9 4.5-9 4.5-9-4.5L12 3z"/></svg></div>
    <span class="logo-text">Nexus<span>AI</span></span>
  </div>
  <button class="new-chat-btn" onclick="window.location.reload()">+ Percakapan Baru</button>
  <div class="chat-list" id="chatList">
    <div class="chat-item active">Sesi Saat Ini</div>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <span class="topbar-title">NexusAI Chat v1</span>
    <button class="send-btn" onclick="toggleTheme()" style="background:none; color:var(--text-secondary)">🌓</button>
  </header>

  <div class="messages-wrap" id="messagesWrap">
    <div class="messages-inner" id="messagesInner">
      <div class="msg">
        <div class="msg-avatar ai">N</div>
        <div class="msg-body">
          <div class="bubble ai">Halo Raihan! Ada yang bisa saya bantu hari ini?</div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="chatInput" rows="1" placeholder="Tulis pesan..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</main>

<script>
  // GANTI IP INI JIKA DEPLOY KE SERVER/CLOUD
  const API_URL = "http://localhost:8080/chat"; 
  let isTyping = false;

  function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
  }

  async function sendMessage() {
    if (isTyping) return;
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    // Tampilkan User Message
    addMessage(text, 'user');
    input.value = '';
    
    // Tampilkan Typing
    isTyping = true;
    const typingId = 'typing-' + Date.now();
    addTypingIndicator(typingId);
    scrollDown();

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id: "user-raihan", 
          message: text
        }),
      });

      const data = await response.json();
      removeElement(typingId);
      addMessage(data.reply || "Gagal mendapatkan respon.", 'ai');

    } catch (error) {
      removeElement(typingId);
      addMessage("Koneksi ke backend gagal. Cek Docker Server kamu.", 'ai', true);
      console.error(error);
    } finally {
      isTyping = false;
      scrollDown();
    }
  }

  function addMessage(content, sender, isError = false) {
    const inner = document.getElementById('messagesInner');
    const msgDiv = document.createElement('div');
    msgDiv.className = `msg ${sender}`;
    msgDiv.innerHTML = `
      <div class="msg-avatar ${sender}">${sender === 'ai' ? 'N' : 'A'}</div>
      <div class="msg-body">
        <div class="bubble ${sender}" style="${isError ? 'color:red' : ''}">${content}</div>
      </div>`;
    inner.appendChild(msgDiv);
  }

  function addTypingIndicator(id) {
    const inner = document.getElementById('messagesInner');
    const div = document.createElement('div');
    div.className = 'msg';
    div.id = id;
    div.innerHTML = `
      <div class="msg-avatar ai">N</div>
      <div class="bubble ai"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    inner.appendChild(div);
  }

  function removeElement(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function scrollDown() {
    const wrap = document.getElementById('messagesWrap');
    wrap.scrollTop = wrap.scrollHeight;
  }
</script>
</body>
</html>
