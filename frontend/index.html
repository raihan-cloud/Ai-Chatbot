<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAI — Cloud & IoT Professional Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
  :root {
    --bg-main: #09090b; --bg-sidebar: #121214; --bg-card: #18181b; --bg-input: #27272a;
    --accent: #6366f1; --accent-hover: #4f46e5; --text-primary: #fafafa; --text-secondary: #a1a1aa; 
    --border: #27272a; --user-bubble: #3f3f46; --sidebar-w: 260px; --transition: all 0.2s ease;
  }
  [data-theme="light"] {
    --bg-main: #ffffff; --bg-sidebar: #f4f4f5; --bg-card: #f4f4f5; --bg-input: #ffffff;
    --text-primary: #18181b; --text-secondary: #71717a; --border: #e4e4e7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-primary); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-w); background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px; z-index: 10; }
  .new-chat { border: 1px solid var(--border); background: var(--accent); color: white; padding: 12px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; margin-bottom: 24px; transition: var(--transition); }
  .new-chat:hover { background: var(--accent-hover); transform: translateY(-1px); }
  .history-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; padding-left: 8px; }
  .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .history-item { padding: 10px 12px; border-radius: 8px; font-size: 13.5px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-secondary); transition: var(--transition); display: flex; align-items: center; gap: 10px; }
  .history-item:hover { background: var(--bg-card); color: var(--text-primary); }

  /* MAIN CONTENT */
  .main-content { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
  header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-main); }
  .chat-container { flex: 1; overflow-y: auto; padding: 40px 16px; display: flex; flex-direction: column; gap: 32px; }
  
  .message-wrapper { max-width: 850px; margin: 0 auto; width: 100%; display: flex; gap: 20px; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .avatar { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .avatar.ai { background: linear-gradient(135deg, #6366f1, #818cf8); color: white; }
  .avatar.user { background: linear-gradient(135deg, #ec4899, #f472b6); color: white; }

  .bubble { line-height: 1.7; font-size: 15px; width: 100%; overflow-x: auto; }
  
  /* Styling Kode Program */
  pre { margin: 16px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  code { font-family: 'Fira Code', monospace !important; font-size: 14px !important; }
  p { margin-bottom: 12px; }

  /* INPUT AREA */
  .input-area { padding: 24px; background: linear-gradient(to top, var(--bg-main) 60%, transparent); }
  .input-box { max-width: 800px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 12px 16px; display: flex; align-items: flex-end; gap: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text-primary); font-size: 15px; padding: 8px 0; resize: none; max-height: 200px; line-height: 1.5; }
  .send-btn { background: var(--accent); border: none; color: white; width: 36px; height: 36px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--transition); flex-shrink: 0; }
  .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }

  .typing-dot { width: 5px; height: 5px; background: var(--text-secondary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
</style>
</head>
<body>

<aside class="sidebar">
  <button class="new-chat" onclick="createNewChat()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    New Chat
  </button>
  <div class="history-label">Past Conversations</div>
  <div class="history-list" id="historyList"></div>
</aside>

<main class="main-content">
  <header>
    <div style="font-family:'Syne'; font-weight:700; font-size: 20px; letter-spacing: -0.5px;">NexusAI</div>
    <div id="sessionTitle" style="font-size: 12px; color: var(--text-secondary); font-weight: 500; background: var(--bg-card); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border);">Active Node: Gemini-1.5-Flash</div>
    <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size: 1.2rem;">🌓</button>
  </header>

  <div class="chat-container" id="chatWindow"></div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="chatInput" rows="1" placeholder="Type your message (Cloud or IoT)..."></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</main>

<script>
  const API_URL = "http://localhost:8080/chat";
  const chatWindow = document.getElementById('chatWindow');
  const chatInput = document.getElementById('chatInput');
  const historyList = document.getElementById('historyList');
  
  let currentChat = [];
  let allSessions = JSON.parse(localStorage.getItem('nexus_sessions') || '[]');

  // Deteksi blok kode (seperti #include atau void setup)
  function formatResponse(text) {
    if (text.includes("#include") || text.includes("void") || text.includes("{")) {
      return `<pre><code>${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>`;
    }
    return `<p>${text}</p>`;
  }

  function createNewChat() {
    if (currentChat.length > 1) {
      const firstUserMsg = currentChat.find(m => m.role === 'user')?.text || "Untitled Chat";
      allSessions.push({ id: Date.now(), title: firstUserMsg, messages: [...currentChat] });
      localStorage.setItem('nexus_sessions', JSON.stringify(allSessions));
    }
    currentChat = [];
    renderHistory();
    renderMessages();
    addMessage("Halo Raihan! Sesi baru siap. Ada kendala di ESP32 atau deployment Docker kamu?", 'ai');
  }

  function renderHistory() {
    historyList.innerHTML = allSessions.slice().reverse().map(session => `
      <div class="history-item" onclick="loadSession(${session.id})">
        <svg style="width:14px; height:14px; opacity:0.6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        ${session.title}
      </div>
    `).join('');
  }

  function loadSession(id) {
    const session = allSessions.find(s => s.id === id);
    if (session) { currentChat = [...session.messages]; renderMessages(); }
  }

  function renderMessages() {
    chatWindow.innerHTML = '';
    currentChat.forEach(msg => displayMessage(msg.text, msg.role));
  }

  async function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;
    addMessage(text, 'user');
    chatInput.value = '';
    chatInput.style.height = 'auto';
    const typingId = 'typing-' + Date.now();
    showTyping(typingId);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      document.getElementById(typingId).remove();
      addMessage(data.reply || "Gagal mendapatkan respon.", 'ai');
    } catch (err) {
      if(document.getElementById(typingId)) document.getElementById(typingId).remove();
      addMessage("Error: Backend tidak merespon (Cek Docker kamu).", 'ai');
    }
  }

  function addMessage(text, role) {
    currentChat.push({ text, role });
    displayMessage(text, role);
  }

  function displayMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'message-wrapper';
    const content = role === 'ai' ? formatResponse(text) : `<p>${text}</p>`;
    div.innerHTML = `
      <div class="avatar ${role}">${role === 'ai' ? 'N' : 'R'}</div>
      <div class="bubble">${content}</div>
    `;
    chatWindow.appendChild(div);
    hljs.highlightAll(); // Jalankan highlighter untuk blok kode
    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
  }

  function showTyping(id) {
    const div = document.createElement('div');
    div.className = 'message-wrapper';
    div.id = id;
    div.innerHTML = `
      <div class="avatar ai">N</div>
      <div class="bubble" style="display:flex; gap:5px; align-items:center; height:36px">
        <div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div>
      </div>
    `;
    chatWindow.appendChild(div);
    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
  }

  chatInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = (this.scrollHeight) + 'px';
  });

  function toggleTheme() {
    const theme = document.documentElement.getAttribute('data-theme');
    document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'light' : 'dark');
  }

  renderHistory();
  addMessage("Halo Raihan! Bagaimana progress infrastruktur Cloud atau IoT kamu hari ini?", 'ai');
</script>
</body>
</html>
